<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybersecurity Incident Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="page-header">
    <h1>Cybersecurity Incident Tracker</h1>
  </header>

  <main class="layout">
    <section class="panel form-panel" aria-labelledby="formTitle">
      <h2 id="formTitle">Add / Edit Incident</h2>

      <form id="incidentForm" novalidate>
        <div class="field">
          <label for="itemCode">Item Code</label>
          <input type="text" id="itemCode" name="item Code">
          <small class="error" id="itemCodeError"></small>
        </div>

        <div class="field">
          <label for="userName">Username</label>
          <input type="text" id="userName" name="username">
          <small class="error" id="userNameError"></small>
        </div>

        <div class="field">
          <label for="dateFrom">Date From</label>
          <input type="date" id="dateFrom" name="date from">
          <small class="error" id="dateFromError"></small>
        </div>

        <div class="field">
          <label for="dateTo">Date To</label>
          <input type="date" id="dateTo" name="date To">
          <small class="error" id="dateToError"></small>
        </div>

        <div class="field">
          <label for="comment">Comment</label>
          <textarea id="comment" name="comment"></textarea>
          <small class="error" id="commentError"></small>
        </div>

        <div class="field">
          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="New" selected>New</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
          </select>
          <small class="error" id="statusError"></small>
        </div>

        <div class="form-buttons">
          <button type="submit" id="saveButton">Add Incident</button>
          <button type="button" id="cancelEditButton" hidden>Cancel Edit</button>
        </div>
      </form>
    </section>

    <section class="panel table-panel" aria-labelledby="tableTitle">
      <h2 id="tableTitle">Incident List</h2>

      <div class="controls">
        <div class="field control-field">
          <label for="searchInput">Search (Username or Item Code)</label>
          <input type="text" id="searchInput" placeholder="Type to search...">
        </div>

        <div class="field control-field">
          <label for="statusFilter">Filter by Status</label>
          <select id="statusFilter">
            <option value="All" selected>All</option>
            <option value="New">New</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
          </select>
        </div>

        <div class="field control-field">
          <label for="sortOrder">Sort by Date From</label>
          <select id="sortOrder">
            <option value="asc">Oldest first</option>
            <option value="desc" selected>Newest first</option>
          </select>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Item Code</th>
            <th>Username</th>
            <th>Date From</th>
            <th>Date To</th>
            <th>Comment</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="incidentsBody">
          <tr>
            <td colspan="8" class="empty-message">No incidents yet.</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
